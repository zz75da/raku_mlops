version: '3.8'

services:
  # === Base de données pour Airflow et MLflow ===
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
      POSTGRES_MULTIPLE_USERS: mlflow_user:mlflow_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    
  # === MinIO (S3 pour DVC et MLflow) ===
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Initialisation des buckets MinIO ===
  minio-client:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minio minio123; do sleep 2; done;
      mc mb myminio/dvc --ignore-existing;
      mc mb myminio/mlflow --ignore-existing;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    restart: on-failure

  # === MLflow Tracking Server ===
  mlflow:
    build: 
      context: .
      dockerfile: mlflow_docker/Dockerfile
    container_name: mlflow
    command: >
      bash -c "
      echo 'Waiting for PostgreSQL to be ready...';
      until pg_isready -h postgres -p 5432 -U mlflow_user -d mlflow; do sleep 2; done;
      echo 'PostgreSQL is ready. Starting MLflow...';
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow_user:mlflow_pass@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      "
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    restart: unless-stopped
    
  # === Init Airflow (db migrate + admin user) ===
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-init
    entrypoint: >
      bash -c "
      echo 'Waiting for PostgreSQL to be ready...';
      until pg_isready -h postgres -p 5432 -U postgres -d airflow; do sleep 2; done;
      echo 'Initializing Airflow database...';
      airflow db migrate;
      echo 'Creating admin user...';
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || echo 'User may already exist';
      echo 'Airflow initialization completed';
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./scripts:/opt/airflow/scripts
      - ./artifacts:/opt/airflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # === Airflow (webserver + scheduler) ===
  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: U7845mUa4D7gVdti1P5Fb4Bktl6Or41h8v8hPfcsn3s=
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW_UID: 50000
      AIRFLOW_GID: 0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREPROCESS_API_URL: http://preprocess-api:5001
      TRAIN_API_URL: http://train-api:5002
      # The rest of your environment variables for file paths are now handled by the individual APIs
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      # The data, scripts, and artifacts are now managed by the respective microservices
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      preprocess-api:
        condition: service_started
      train-api:
        condition: service_started
    command: >
      bash -c "
      echo 'Starting Airflow services...';
      airflow webserver -p 8080 &
      airflow scheduler
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
    restart: unless-stopped
    
  # === gate-api (New Service) ===
  gate-api:
    build:
      context: ./gate-api
    container_name: gate-api
    ports:
      - "5000:5000" # Expose a different port for the gateway
    restart: unless-stopped
    
  # === preprocess-api (New Service) ===
  preprocess-api:
    build:
      context: ./preprocess-api
    container_name: preprocess-api
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    
  # === train-api (New Service) ===
  train-api:
    build:
      context: ./train-api
    container_name: train-api
    ports:
      - "5002:5002"
    volumes:
      - ./data:/app/data
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  # === predict-api (New Service) ===
  predict-api:
    build:
      context: ./predict-api
    container_name: predict-api
    ports:
      - "5003:5003"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    
  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - predict-api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # === Grafana ===
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./monitoring/grafana_dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  # === Streamlit ===
  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile.streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      - PREDICT_API_URL=http://predict-api:5003 # Updated URL
      - ARTIFACTS_PATH=/app/artifacts
      - IMAGE_ROOT_TRAIN: /app/images/image_train
      - IMAGE_ROOT_TEST: /app/images/image_test
    volumes:
      - ./streamlit:/app
      - ./artifacts:/app/artifacts:ro
      - ./images:/app/images:ro
    depends_on:
      - predict-api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # === Pushgateway (Prometheus metrics) ===
  pushgateway:
    image: prom/pushgateway
    container_name: pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  grafana-storage: